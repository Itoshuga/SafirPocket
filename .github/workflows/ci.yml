name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
        env:
          DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-public-placeholder
          NODE_ENV: test
          API_PORT: 3001
          WEB_ORIGIN: http://localhost:3000
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_ANON_KEY: ci-public-placeholder
          SUPABASE_SERVICE_ROLE_KEY: ci-server-placeholder
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          REDIS_URL: redis://127.0.0.1:6379

  frontend-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @safir/web exec playwright install --with-deps chromium
      - run: pnpm --filter @safir/web test:e2e --project=chromium
